name: Java 21 CI (Maven)

on:
  pull_request:
    branches: [ "main" ] # Se activa al abrir un PR hacia main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin' # Distribución recomendada (Eclipse Temurin)
          cache: maven

      - name: Build and Test with Maven
        run: mvn -B package --file pom.xml
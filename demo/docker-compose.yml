version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bikestore-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: bikestore
      MYSQL_USER: bikeuser
      MYSQL_PASSWORD: bike1234
    ports:
      - "3306:3306"
    volumes:
      - bikestore-data:/var/lib/mysql
    networks:
      - bikestore-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot1234" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: stiven77/bikestore:v9
    container_name: bikestore-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bikestore?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: bikeuser
      SPRING_DATASOURCE_PASSWORD: bike1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bikestore-network

volumes:
  bikestore-data:
    driver: local

networks:
  bikestore-network:
    driver: bridge

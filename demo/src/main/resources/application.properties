spring.application.name=bikeStore

# Servidor
server.port=8080

# Base de datos
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bikestore?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bikeuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bike1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger
springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/api-docs

# JWT
secret-key=${JWT_SECRET_KEY:bXktc2VjcmV0LWtleS1mb3Itand0LWV4YW1wbGUtYXBwbGljYXRpb24=}
token-expiration=${JWT_TOKEN_EXPIRATION:600000}
refresh-threshold=${JWT_REFRESH_THRESHOLD:120000}